services:
  claude-dev:
    container_name: ${COMPOSE_PROJECT_NAME:-claude-dev}
    build:
      context: .
      args:
        CODE_PATH: ${CODE_PATH}
        USERNAME: ${USER}
        USER_HOME: ${HOME}
        SSH_AUTHORIZED_KEYS: ${SSH_AUTHORIZED_KEYS}
    user: '${USER}'
    ports:
      - "${SSH_PORT:-2222}:22"
    volumes:
      - ${CODE_PATH}:${CODE_PATH}
      - ${HOME}/.claude:${HOME}/.claude
      - ${HOME}/.claude.json:${HOME}/.claude.json
      - ./data/ssh:/etc/ssh                      # persist SSH host keys across rebuilds

    command: >
      sh -c "
        if [ ! -f /etc/ssh/sshd_config ]; then
          sudo cp -r /etc/ssh.original/. /etc/ssh/
          sudo ssh-keygen -A
        fi
        sudo /usr/sbin/sshd -D
      "
    restart: always
